<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方剂学刷题系统</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        。container {
            max-width: 600px;
            width: 90%;
            background: white;
            padding: 20px;
            margin-top: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        。modes {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .mode-btn {
            background-color: #ecf0f1;
            color: var(--primary-color);
        }

        .mode-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        .question-card {
            margin-bottom: 20px;
        }

        .info-label {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .question-text {
            font-size: 1.2em;
            font-weight: bold;
            color: #34495e;
            padding: 15px;
            background: #f9f9f9;
            border-left: 5px solid var(--primary-color);
            min-height: 60px;
            margin-bottom: 20px;
        }

        .options {
            display: grid;
            gap: 10px;
        }

        .option-btn {
            background-color: white;
            border: 2px solid #ddd;
            text-align: left;
            padding: 15px;
            font-size: 16px;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--primary-color);
            background-color: #f0f4f8;
        }

        .option-btn.correct {
            background-color: var(--success-color) !important;
            color: white;
            border-color: var(--success-color);
        }

        .option-btn.wrong {
            background-color: var(--error-color) !important;
            color: white;
            border-color: var(--error-color);
        }

        .nav-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .nav-btn {
            background-color: #3498db;
            color: white;
            width: 100px;
        }

        .nav-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .progress {
            text-align: center;
            margin-top: 10px;
            color: #95a5a6;
            font-size: 14px;
        }

        .result-mark {
            display: inline-block;
            margin-left: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; color: var(--primary-color);">方剂刷题练习</h2>
        
        <!-- 模式切换 -->
        <div class="modes">
            <button class="mode-btn active" onclick="changeMode('category')">按分类出题</button>
            <button class="mode-btn" onclick="changeMode('composition')">按组成出题</button>
            <button class="mode-btn" onclick="changeMode('indications')">按主治出题</button>
        </div>

        <!-- 题目区域 -->
        <div id="quiz-area">
            <div class="info-label" id="mode-label">题目要求：根据以下分类选择方剂名称</div>
            <div class="question-text" id="question-content">加载中...</div>
            
            <div class="options" id="options-container">
                <!-- 选项动态生成 -->
            </div>
        </div>

        <!-- 导航 -->
        <div class="nav-btns">
            <button class="nav-btn" id="prev-btn" onclick="prevQuestion()">上一题</button>
            <button class="nav-btn" id="refresh-btn" onclick="initQuiz()" style="background-color: #9b59b6;">换一批题</button>
            <button class="nav-btn" id="next-btn" onclick="nextQuestion()">下一题</button>
        </div>

        <div class="progress" id="progress-text">第 1 / 10 题</div>
    </div>

    let currentQuestions = [];
    let currentIndex = 0;
    let currentMode = 'category'; // category, composition, indications
    let userAnswers = []; // 记录用户每题的状态

    // 初始化考试
    function initQuiz() {
        // 随机抽取10个
        currentQuestions = [...rawData].sort(() => 0.5 - Math.random()).slice(0, 10);
        currentIndex = 0;
        userAnswers = new Array(10).fill(null);
        renderQuestion();
    }

    // 切换模式
    function changeMode(mode) {
        currentMode = mode;
        // 更新按钮UI
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.includes(getModeName(mode))) btn.classList.add('active');
        });
        
        let label = "";
        if(mode === 'category') label = "题目要求：根据以下【分类】选择正确的方剂";
        if(mode === 'composition') label = "题目要求：根据以下【组成】选择正确的方剂";
        if(mode === 'indications') label = "题目要求：根据以下【主治】选择正确的方剂";
        document.getElementById('mode-label').innerText = label;

        renderQuestion();
    }

    function getModeName(mode) {
        if(mode === 'category') return "分类";
        if(mode === 'composition') return "组成";
        if(mode === 'indications') return "主治";
    }

    // 渲染题目
    function renderQuestion() {
        const item = currentQuestions[currentIndex];
        const questionContent = document.getElementById('question-content');
        const optionsContainer = document.getElementById('options-container');
        const progressText = document.getElementById('progress-text');

        // 设置题干
        questionContent.innerText = item[currentMode];

        // 生成选项：1个正确 + 3个错误
        let correctName = item.name;
        let distractors = rawData
            .filter(d => d.name !== correctName)
            .sort(() => 0.5 - Math.random())
            .slice(0, 3)
            .map(d => d.name);
        
        let options = [correctName, ...distractors].sort(() => 0.5 - Math.random());

        // 清空并填充选项
        optionsContainer.innerHTML = '';
        options.forEach(optName => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = optName;
            
            // 如果这道题已经答过了，恢复显示状态
            if (userAnswers[currentIndex] !== null) {
                btn.classList.add('disabled');
                if (optName === correctName) btn.classList.add('correct');
                if (optName === userAnswers[currentIndex] && optName !== correctName) btn.classList.add('wrong');
            } else {
                btn.onclick = () => checkAnswer(optName, correctName, btn);
            }
            
            optionsContainer.appendChild(btn);
        });

        // 更新导航按钮和进度
        progressText.innerText = `第 ${currentIndex + 1} / 10 题`;
        document.getElementById('prev-btn').disabled = currentIndex === 0;
        document.getElementById('next-btn').disabled = currentIndex === 9;
    }

    // 检查答案
    function checkAnswer(selected, correct, btn) {
        if (userAnswers[currentIndex] !== null) return; // 防止重复点击

        userAnswers[currentIndex] = selected;
        const allButtons = document.querySelectorAll('.option-btn');
        
        allButtons.forEach(b => {
            b.classList.add('disabled');
            if (b.innerText === correct) {
                b.classList.add('correct');
            }
        });

        if (selected !== correct) {
            btn.classList.add('wrong');
        }

        // 1秒后自动跳到下一题 (可选)
        // setTimeout(nextQuestion, 1200);
    }

    function nextQuestion() {
        if (currentIndex < 9) {
            currentIndex++;
            renderQuestion();
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
        }
    }

    // 页面加载完成后启动
    window.onload = initQuiz;
</script>

</body>
</html>
